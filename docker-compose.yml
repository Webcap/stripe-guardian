services:
  stripe-guardian:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stripe-guardian
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./logs:/app/logs
    networks:
      - stripe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Add a monitoring dashboard
  stripe-monitor:
    image: grafana/grafana:latest
    container_name: stripe-monitor
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - stripe-network
    depends_on:
      - stripe-guardian

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: stripe-guardian-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - stripe-network
    depends_on:
      - stripe-guardian

  certbot:
    image: certbot/certbot
    container_name: stripe-guardian-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  stripe-network:
    driver: bridge

volumes:
  grafana-storage:
